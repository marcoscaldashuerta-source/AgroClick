{% extends 'base.html' %}
{% block content %}
<h1>Confirmar eliminación de producto</h1>
<p>Producto: <strong>{{ producto.nombre }}</strong> (Vendedor: {{ producto.vendedor.username }})</p>
<form method="post">
    {% csrf_token %}
    <label for="razon">Motivo de la eliminación (visible para el vendedor):</label><br/>
    <textarea name="razon" id="razon" rows="4" cols="60"></textarea><br/>
    <button type="submit">Confirmar eliminación</button>
    <a href="{% url 'supervisar_productos' %}">Cancelar</a>
</form>
{% endblock %}
